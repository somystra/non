<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Axmadjon Non Markazi</title>
<style>
  :root{
    --clay:#A6532A; --clay-dark:#6E3418; --wheat:#D9A441;
    --flour:#F6EFE3; --charcoal:#2B211A; --line:#E8DCC4;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--flour);color:var(--charcoal);font-family:sans-serif;padding:20px;}
  h1{font-size:1.3rem;color:var(--clay-dark);margin-bottom:20px;}
  h2{font-size:1rem;color:var(--clay-dark);margin:24px 0 12px;}

  /* Login screen */
  #loginScreen{
    max-width:340px;margin:80px auto;text-align:center;
    background:#fff;border:1px solid var(--line);border-radius:16px;padding:32px 24px;
  }
  #loginScreen input{
    width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;
    margin:16px 0;font-size:1rem;
  }
  #loginScreen button, .btn{
    background:var(--clay);color:#fff;border:none;padding:12px 20px;
    border-radius:10px;font-size:0.95rem;font-weight:600;cursor:pointer;
  }
  #loginScreen button:hover, .btn:hover{background:var(--clay-dark);}
  #loginError{color:#B3261E;font-size:0.85rem;margin-top:8px;display:none;}

  /* Admin panel */
  #panel{display:none;max-width:640px;margin:0 auto;}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px;}
  .card label{display:block;font-size:0.82rem;color:#8A7860;margin:10px 0 4px;}
  .card input, .card textarea{
    width:100%;padding:10px;border:1px solid var(--line);border-radius:8px;font-size:0.9rem;
    font-family:sans-serif;
  }
  .card textarea{min-height:60px;resize:vertical;}
  .card img.preview{width:70px;height:70px;object-fit:cover;border-radius:8px;margin-top:6px;background:var(--line);}
  .row-actions{display:flex;gap:8px;margin-top:12px;}
  .row-actions button{flex:1;padding:9px;border:none;border-radius:8px;font-size:0.85rem;cursor:pointer;font-weight:600;}
  .save-btn{background:var(--clay);color:#fff;}
  .save-btn:hover{background:var(--clay-dark);}
  .delete-btn{background:#F1E6D0;color:var(--clay-dark);}
  .delete-btn:hover{background:#e8d7b3;}
  .add-btn{display:block;width:100%;margin-top:6px;padding:12px;background:var(--clay-dark);color:#fff;border:none;border-radius:10px;font-weight:600;cursor:pointer;}
  .status{font-size:0.82rem;color:#3D7A3D;margin-top:6px;display:none;}
  .logout{float:right;background:none;border:1px solid var(--line);padding:6px 12px;border-radius:8px;font-size:0.8rem;cursor:pointer;color:#8A7860;}
</style>
</head>
<body>

<div id="loginScreen">
  <h1>Admin panel</h1>
  <p style="font-size:0.85rem;color:#8A7860;">Kirish uchun parolni kiriting</p>
  <input type="password" id="passInput" placeholder="Parol">
  <button onclick="tryLogin()">Kirish</button>
  <div id="loginError">Parol noto'g'ri, qayta urinib ko'ring.</div>
</div>

<div id="panel">
  <button class="logout" onclick="logout()">Chiqish</button>
  <h1>Axmadjon Non Markazi — boshqaruv</h1>

  <h2>Mahsulotlar</h2>
  <div id="productsList"></div>
  <button class="add-btn" onclick="addProduct()">+ Yangi mahsulot qo'shish</button>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyA9M_QtHJ71sND6bD8h8UpouLKafiBxgOk",
    authDomain: "ahmadjonnonmarkaz.firebaseapp.com",
    projectId: "ahmadjonnonmarkaz",
    storageBucket: "ahmadjonnonmarkaz.firebasestorage.app",
    messagingSenderId: "863026607152",
    appId: "1:863026607152:web:612c5daba7589398d469f5",
    measurementId: "G-6C21VRCCMK"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const storage = firebase.storage();

  const ADMIN_PASSWORD = "nonmarkazi2026"; // shu parolni xohlagancha o'zgartiring

  function tryLogin(){
    const val = document.getElementById('passInput').value;
    if(val === ADMIN_PASSWORD){
      sessionStorage.setItem('nonMarkazi_admin_ok', '1');
      showPanel();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  }
  document.getElementById('passInput').addEventListener('keydown', e => {
    if(e.key === 'Enter') tryLogin();
  });

  function logout(){
    sessionStorage.removeItem('nonMarkazi_admin_ok');
    location.reload();
  }

  function showPanel(){
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    listenProducts();
  }

  if(sessionStorage.getItem('nonMarkazi_admin_ok') === '1'){
    showPanel();
  }

  // ---- Products ----
  function listenProducts(){
    db.collection('products').orderBy('createdAt', 'asc').onSnapshot(snapshot => {
      const products = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderProductsList(products);
    }, err => console.error(err));
  }

  function renderProductsList(products){
    const container = document.getElementById('productsList');
    container.innerHTML = '';
    products.forEach(p => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <label>Nomi</label>
        <input type="text" value="${p.name || ''}" onchange="updateProduct('${p.id}', 'name', this.value)">
        <label>Narxi (so'm)</label>
        <input type="text" value="${p.price || ''}" onchange="updateProduct('${p.id}', 'price', this.value)">
        <label>Tavsif</label>
        <input type="text" value="${p.desc || ''}" onchange="updateProduct('${p.id}', 'desc', this.value)">
        <label>Rasm</label>
        <input type="file" accept="image/*" onchange="uploadImage('${p.id}', this)">
        ${p.image ? `<img class="preview" src="${p.image}">` : ''}
        <div class="status" id="status_${p.id}">✔ Rasm yuklandi</div>
        <div class="row-actions">
          <button class="delete-btn" onclick="deleteProduct('${p.id}')">O'chirish</button>
        </div>
      `;
      container.appendChild(card);
    });
  }

  function updateProduct(id, field, value){
    db.collection('products').doc(id).update({ [field]: value })
      .catch(err => alert('Xato: ' + err.message));
  }

  function uploadImage(id, input){
    const file = input.files[0];
    if(!file) return;
    const statusEl = document.getElementById('status_' + id);
    const ref = storage.ref('products/' + id + '_' + Date.now() + '_' + file.name);
    ref.put(file).then(snapshot => snapshot.ref.getDownloadURL())
      .then(url => db.collection('products').doc(id).update({ image: url }))
      .then(() => {
        if(statusEl){ statusEl.style.display = 'block'; setTimeout(() => statusEl.style.display = 'none', 2000); }
      })
      .catch(err => alert('Rasm yuklashda xato: ' + err.message));
  }

  function addProduct(){
    db.collection('products').add({
      name: 'Yangi mahsulot', price: '', desc: '', image: '',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).catch(err => alert('Xato: ' + err.message));
  }

  function deleteProduct(id){
    if(!confirm('Ushbu mahsulotni o\'chirishga ishonchingiz komilmi?')) return;
    db.collection('products').doc(id).delete()
      .catch(err => alert('Xato: ' + err.message));
  }
</script>

</body>
</html>
